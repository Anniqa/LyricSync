name: Build & Send APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricSync-debug
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping (APK is available as an artifact)."
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${{ steps.apk.outputs.path }}" \
            -F "caption=LyricSync debug build — ${{ github.event.head_commit.message }}" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print('OK' if r.get('ok') else 'FAIL: '+str(r))"
